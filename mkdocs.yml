site_name: printphys
site_description: Accurate URDF physics for 3D-printed parts
site_author: Lakshya Saraf
copyright: Copyright &copy; 2026 Lakshya Saraf
repo_url: https://github.com/LakshyaSaraff/printphys
theme:
  name: material
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Light mode
  features:
    - content.code.copy
    - navigation.sections

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Accuracy methodology: accuracy.md

markdown_extensions:
  - admonition
  - pymdownx.superfences
  - pymdownx.highlight
